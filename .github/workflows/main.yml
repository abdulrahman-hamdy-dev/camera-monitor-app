name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-20.04  # هنستخدم نسخة أقدم شوية لأنها أكثر استقراراً مع أندرويد
    steps:
      - uses: actions/checkout@v2

      - name: Build with Buildozer
        uses: ArtemSerebriakov/buildozer-action@v1
        with:
          command: buildozer android debug
          buildozer_version: master  # عشان ياخد آخر التحديثات المستقرة
