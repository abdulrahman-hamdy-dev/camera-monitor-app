name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev ffmpeg libsdl2-dev \
          libtool autoconf automake pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev cmake libffi-dev libssl-dev openjdk-17-jdk unzip zip

      - name: Install Buildozer & Cython
        run: |
          pip install --user --upgrade "Cython<3.0" virtualenv buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          # 1. تثبيت نسخة setuptools قديمة لحل مشكلة الـ NDK AttributeError
          pip install --user --upgrade "setuptools<70.0.0"
          
          # 2. مسح يدوي للمجلدات لو كانت موجودة (أضمن من أمر buildozer clean حالياً)
          rm -rf .buildozer
          
          # 3. تشغيل البناء مباشرة
          buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Camera-Monitor-App
          path: bin/*.apk
